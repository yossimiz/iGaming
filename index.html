<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live High-RTP Casino & Slot Tracker | EU & UK</title>
    <style>
        :root {
            --primary-color: #1a237e;
            --accent-color: #ff5722;
            --text-color: #333;
            --bg-color: #f8f9fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 { color: var(--primary-color); margin-top: 0; }
        p.subtitle { color: #666; font-size: 1.1rem; margin-bottom: 30px; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; margin-bottom: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #ddd; }
        th { background-color: #f1f3f9; color: var(--primary-color); font-weight: 600; }
        .rtp-badge { background-color: #e8f5e9; color: #2e7d32; padding: 5px 10px; border-radius: 4px; font-weight: bold; }
        .btn-play { background-color: var(--accent-color); color: white; padding: 8px 16px; text-decoration: none; border-radius: 4px; font-weight: bold; display: inline-block; }
        .btn-play:hover { background-color: #e64a19; }
        .regulatory-text { display: block; font-size: 0.75rem; color: #888; margin-top: 5px; max-width: 200px; line-height: 1.2; }
        .loading { text-align: center; padding: 40px; font-size: 1.2rem; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>Live High-RTP Casino Tracker</h1>
    <p class="subtitle">Real-time data-driven insights for smart players in Europe & United Kingdom. Data updates hourly.</p>
    
    <div class="table-responsive">
        <div id="loading" class="loading">Loading live casino data...</div>
        <table id="casino-table" style="display: none;">
            <thead>
                <tr>
                    <th>Casino Brand</th>
                    <th>Welcome Bonus</th>
                    <th>Average Live RTP</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
