<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live RTP Casino Tracker | Real-Time iGaming Data Hub</title>
    <style>
        :root {
            --bg-color: #0f172a; /* כחול-כהה עמוק מודרני */
            --card-bg: #1e293b; /* רקע כרטיסים וטבלאות */
            --primary-text: #f8fafc;
            --secondary-text: #94a3b8;
            --accent-color: #10b981; /* ירוק אמרלד חיובי ל-RTP */
            --btn-color: #3b82f6; /* כחול בולט לכפתורים */
            --btn-hover: #2563eb;
            --border-color: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        header {
            margin-bottom: 35px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 25px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--secondary-text);
            font-size: 1.1rem;
            margin: 0;
        }

        /* סרגל כלי סינון ומיון */
        .controls {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 20px;
        }

        .controls select {
            background-color: var(--bg-color);
            color: var(--primary-text);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }

        .table-responsive {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            background: var(--card-bg);
        }

        th, td {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        th {
            background-color: #111827;
            color: var(--primary-text);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        tr:hover td {
            background-color: #24334d;
            transition: background-color 0.2s;
        }

        .casino-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-text);
        }

        .bonus-badge {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            display: inline-block;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .rtp-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        .rtp-badge {
            color: var(--accent-color);
            font-size: 1.2rem;
            font-weight: 800;
        }

        .btn-play {
            background-color: var(--btn-color);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            display: inline-block;
            text-align: center;
            box-shadow: 0 4px 12px rgba(57, 130, 246, 0.3);
            transition: all 0.2s;
        }

        .btn-play:hover {
            background-color: var(--btn-hover);
            transform: translateY(-1px);
        }

        .regulatory-text {
            display: block;
            font-size: 0.7rem;
            color: var(--secondary-text);
            margin-top: 6px;
            max-width: 220px;
            line-height: 1.3;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--secondary-text);
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Live RTP Casino Tracker</h1>
        <p class="subtitle">Real-time data engine monitoring verified payouts across EU & UK jurisdictions.</p>
    </header>

    <!-- סרגל סינון ומיון חדש -->
    <div class="controls">
        <select id="sort-select">
            <option value="default">Sort By: Default</option>
            <option value="rtp-desc">Highest RTP First</option>
            <option value="name-asc">Alphabetical (A-Z)</option>
        </select>
    </div>
    
    <div class="table-responsive">
        <div id="loading" class="loading">Fetching cryptographic live matrix...</div>
        <table id="casino-table" style="display: none;">
            <thead>
                <tr>
                    <th>Casino Brand</th>
                    <th>Verified Welcome Offer</th>
                    <th>Live Tracker RTP</th>
                    <th>Secure Link</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
