name: Hourly Casino Data Update

on:
  schedule:
    - cron: '0 * * * *' # רץ אוטומטית בכל שעה עגולה
  workflow_dispatch: # מאפשר לך להריץ את זה גם ידנית בלחיצת כפתור בגיטהב

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Data Fetcher Script
      env:
        IGAMING_API_KEY: ${{ secrets.IGAMING_API_KEY }} # משיכת מפתח האבטחה הסודי
      run: python fetch_data.py

    - name: Commit and Push if data changed
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.name "actions@github.com"
        git add data.json
        git diff-index --quiet HEAD || git commit -m "Automated hourly data update [skip ci]"
        git push
