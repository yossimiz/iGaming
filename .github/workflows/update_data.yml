name: Update Dynamic Casino Data

on:
  workflow_dispatch: # מאפשר לך להפעיל את הריצה ידנית מתי שתרצה
  schedule:
    - cron: '0 * * * *' # מפעיל את הסריקה אוטומטית בכל שעה עגולה

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    # 1. משיכת הקוד מהרפוזיטורי
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. התקנת סביבת פייתון מעודכנת
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-cache: 'pip'
        python-version: '3.11'

    # 3. התקנת החבילות הנדרשות לפרויקט
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright

    # 4. שלב קריטי: התקנת דפדפן הכרומיום הרשמי של Playwright בשרת האובונטו
    - name: Install Playwright Browsers
      run: python -m playwright install chromium --with-deps

    # 5. הרצת סקריפט הסריקה שכתבנו
    - name: Run Fetch Data Script
      run: python fetch_data.py

    # 6. שמירה וביצוע Commit אוטומטי של קובץ data.json החדש ישירות לאתר
    - name: Commit and Push update
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Live Casino Feed Auto-Updated [Skip CI]" && git push)
