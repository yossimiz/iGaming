<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Matrix - Free Demo Games</title>
    <style>
        /* עיצוב מטריקס קזינו יוקרתי */
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            margin-bottom: 30px;
        }
        
        /* גריד של לובי המשחקים */
        .games-lobby {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* כרטיס משחק בלובי */
        .game-card {
            background: linear-gradient(135deg, #141b2d 0%, #0f1423 100%);
            border: 1px solid #1f293d;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s, border-color 0.3s;
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #00ffcc;
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.2);
        }
        .game-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        .game-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .play-btn {
            background-color: #00ffcc;
            color: #0b0f19;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .play-btn:hover {
            background-color: #00ccff;
        }

        /* חלון פופ-אפ למשחק הדמו המוטמע (כמו Casino Guru) */
        .game-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(5, 8, 16, 0.95);
            z-index: 100000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal-content {
            width: 90%;
            max-width: 960px;
            height: 70vh;
            background-color: #141b2d;
            border: 2px solid #00ffcc;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .close-modal-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background-color: #ff3366;
            color: white;
            border: none;
            padding: 8px 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            z-index: 100001;
        }
        
        /* כפתור כסף אמיתי מתחת למשחק (הרווח שלך) */
        .real-money-bar {
            margin-top: 15px;
            text-align: center;
            width: 90%;
            max-width: 960px;
        }
        .real-money-btn {
            display: inline-block;
            background: linear-gradient(90deg, #ffcc00, #ff9900);
            color: #000;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 0 25px rgba(255, 204, 0, 0.7); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>🎰 CASINO MATRIX - FREE DEMO LOBBY 🎰</h1>

    <!-- לובי המשחקים -->
    <div class="games-lobby">
        
        <!-- משחק 1 -->
        <div class="game-card">
            <div class="game-icon">🔮</div>
            <div class="game-title">Starburst Slot Demo</div>
            <button class="play-btn" onclick="openGame('https://playngouat.com')">PLAY DEMO</button>
        </div>

        <!-- משחק 2 -->
        <div class="game-card">
            <div class="game-icon">🤠</div>
            <div class="game-title">Book of Dead Demo</div>
            <button class="play-btn" onclick="openGame('https://playngouat.com')">PLAY DEMO</button>
        </div>

        <!-- משחק 3 -->
        <div class="game-card">
            <div class="game-icon">🎡</div>
            <div class="game-title">Instant Roulette Free</div>
            <button class="play-btn" onclick="openGame('https://playngouat.com')">PLAY DEMO</button>
        </div>

    </div>

    <!-- חלון הפופ-אפ להצגת המשחק המוטמע (Iframe) -->
    <div id="gameModal" class="game-modal">
        <button class="close-modal-btn" onclick="closeGame()">❌ CLOSE GAME</button>
        
        <div class="modal-content">
            <iframe id="gameIframe" src=""></iframe>
        </div>
        
        <!-- כפתור שותפים לכסף אמיתי -->
        <div class="real-money-bar">
            <a id="realMoneyLink" href="https://bet365.link" target="_blank" class="real-money-btn">💰 PLAY FOR REAL MONEY WITH BONUS! 💰</a>
        </div>
    </div>

    <script>
        const modal = document.getElementById("gameModal");
        const iframe = document.getElementById("gameIframe");
        const realMoneyLink = document.getElementById("realMoneyLink");

        // פונקציה לפתיחת משחק והטענת הלינק שלו
        function openGame(demoUrl) {
            iframe.src = demoUrl; // טוען את משחק הדמו בתוך ה-Iframe
            modal.style.display = "flex"; // מציג את החלון מעל הכל
            
            // כאן נשלוף באקראי ליק שותפים מהרשימה הקיימת באתר שלך
            let activeData = (window.filteredData && window.filteredData.length > 0) ? window.filteredData : window.casinoData;
            if (activeData && activeData.length > 0) {
                const randomCasino = activeData[Math.floor(Math.random() * activeData.length)];
                realMoneyLink.href = randomCasino.affiliate_link || "https://bet365.link";
            }
        }

        // פונקציה לסגירת המשחק וניקוי ה-Iframe (כדי שהמשחק לא ימשיך לרוץ ברקע)
        function closeGame() {
            modal.style.display = "none";
            iframe.src = ""; 
        }
    </script>

</body>
</html>
